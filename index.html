<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock-paper-scissor Game</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }
      img {
        height: 50px;
        border: 2px solid black;
        border-radius: 50%;
        background-color: black;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Rock-paper-scissor Game</h1>

    <h3>User's move:</h3>
    <img src="images/rock-emoji.png" alt="" class="rock" />
    <img src="images/scissors-emoji.png" alt="" class="scissors" />
    <img src="images/paper-emoji.png" alt="" class="paper" />
    <h3>Computer's move:</h3>
    <p class="computer-pick"></p>
    <h3>Pick's comparison:</h3>
    <p class="pick-comparison"></p>
    <h3>Result:</h3>
    <p class="result"></p>
    <h3>Total scores:</h3>
    <p class="score">
      win: <span class="win">0 </span> loss: <span class="lose">0 </span> tie:
      <span class="tie">0</span>
    </p>
    <button class="reset">Reset</button>
    <button class="autoplay">Auto-play</button>
    <script src="index.js"></script>
  </body>
</html>
